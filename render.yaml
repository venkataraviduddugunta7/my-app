services:
  - type: web
    name: pg-management-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run db:generate
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 9000
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pg-management-db
          property: connectionString

databases:
  - name: pg-management-db
    plan: free
    databaseName: pg_management
    user: pg_management_user
